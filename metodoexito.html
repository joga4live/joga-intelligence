<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PASLEY · El Método del Éxito</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Archivo:wght@400;500;600;700&display=swap');
  :root{ --ink:#0e1419; --ink2:#121b22; --surface:#172129; --surface2:#1d2932; --line:#2a3a45; --gold:#d4b078; --goldHi:#ecd2a0; --goldDim:#9c845a; --goldDimA:#9c845a55; --text:#ece6da; --muted:#8b97a0; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--ink);color:var(--text);font-family:Archivo,system-ui,sans-serif}
  #root{min-height:100vh}
  .ic{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
  .ic svg{width:100%;height:100%}
  .bt-fade{opacity:0;transform:translateY(14px);animation:btFade .6s cubic-bezier(.2,.8,.2,1) forwards}
  @keyframes btFade{to{opacity:1;transform:translateY(0)}}
  .bt-spin{animation:btSpin 1s linear infinite}
  @keyframes btSpin{to{transform:rotate(360deg)}}
  .bt-card{transition:transform .25s cubic-bezier(.2,.8,.2,1),border-color .25s,box-shadow .25s}
  .bt-card:hover{transform:translateY(-5px);border-color:var(--acc)!important;box-shadow:0 18px 40px -22px var(--acc)}
  .bt-card:active{transform:translateY(-1px)}
  .bt-tab:hover{color:var(--text)}
  .bt-reset:hover{color:var(--text);border-color:var(--gold)}
  .bt-close:hover{color:var(--text);border-color:var(--gold)}
  .bt-action:hover{filter:brightness(1.15)}
  .bt-ctrl:hover{filter:brightness(1.12);transform:translateY(-1px)}
  .bt-activate:hover{filter:brightness(1.08)}
  .bt-analyze:hover:not(:disabled){filter:brightness(1.06);transform:translateY(-1px);box-shadow:0 14px 34px -18px var(--gold)}
  .bt-chip:hover:not(:disabled){border-color:var(--gold);color:var(--text)}
  textarea:focus{border-color:var(--gold)!important}
  textarea::placeholder,input::placeholder{color:var(--muted)}
  ::-webkit-scrollbar{width:9px}
  ::-webkit-scrollbar-track{background:var(--ink)}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px}
  .pl-logo{animation:plLogo 1.1s cubic-bezier(.2,.8,.2,1) both}
  @keyframes plLogo{0%{opacity:0;transform:scale(.82)}60%{opacity:1}100%{opacity:1;transform:scale(1);filter:drop-shadow(0 0 30px rgba(212,176,120,.35))}}
  .pl-fade{opacity:0;animation:plFade .7s ease forwards}
  .pl-d1{animation-delay:.5s}.pl-d2{animation-delay:.8s}.pl-d3{animation-delay:1s}.pl-d4{animation-delay:1.15s}.pl-d5{animation-delay:1.3s}.pl-d6{animation-delay:1.55s}
  @keyframes plFade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .ls-letter{display:inline-block;opacity:0;animation:lsSlam .5s cubic-bezier(.2,1.5,.4,1) forwards;animation-delay:var(--d)}
  @keyframes lsSlam{0%{opacity:0;transform:translate(var(--sx),var(--sy)) rotate(var(--r)) scale(.15)}70%{opacity:1}100%{opacity:1;transform:translate(0,0) rotate(0) scale(1)}}
  .ls-soup{animation:lsSoup 2s ease forwards}
  @keyframes lsSoup{0%{opacity:var(--op);transform:translateY(0)}55%{opacity:var(--op)}100%{opacity:0;transform:translateY(-16px)}}
  .ls-flash{position:absolute;inset:0;pointer-events:none;opacity:0;background:radial-gradient(circle at 50% 48%, rgba(236,210,160,.6), transparent 62%);animation:lsFlash 1s ease forwards;animation-delay:.5s}
  @keyframes lsFlash{0%{opacity:0}12%{opacity:.75}100%{opacity:0}}
  .ls-word{animation:lsShake .45s ease;animation-delay:.5s}
  @keyframes lsShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}50%{transform:translateX(5px)}75%{transform:translateX(-2px)}}
  .ls-pulse{animation:lsPulse 1.6s ease-in-out infinite}
  @keyframes lsPulse{0%,100%{opacity:.4}50%{opacity:.92}}
  .bt-qfade{animation:btQfade .45s ease}
  @keyframes btQfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
