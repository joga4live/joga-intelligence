<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONEXIUM — Estructura de navegación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;0,6..96,800;1,6..96,500&family=Archivo:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a1420; --ink-2:#0d1c2c; --ink-3:#12273b;
    --gold:#c9a227; --gold-lt:#e7cd72;
    --silver:#cdd6df; --silver-2:#9fb0bc;
    --green:#1f8a63; --green-lt:#3fb487;
    --cream:#ece3cd; --line:rgba(201,162,39,.18);
    --txt:#c6d0da; --txt-dim:#8b99a6;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:'Archivo',sans-serif; color:var(--txt); -webkit-font-smoothing:antialiased;
    background:
      radial-gradient(1100px 600px at 85% -8%, #15304a 0%, transparent 55%),
      radial-gradient(800px 500px at -5% 105%, #0c2034 0%, transparent 55%),
      var(--ink);
    min-height:100vh;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:0 26px}

  /* ============ TOP BAR (logo + barra principal) ============ */
  .topbar{
    position:sticky; top:0; z-index:50; backdrop-filter:blur(14px);
    background:linear-gradient(180deg, rgba(10,20,32,.92), rgba(10,20,32,.7));
    border-bottom:1px solid var(--line);
  }
  .topbar-inner{display:flex;align-items:center;justify-content:space-between;height:84px}
  /* --- logo --- */
  .logo{display:flex;align-items:center;gap:15px;cursor:pointer}
  .logo-mark{height:46px;width:auto;display:block;filter:drop-shadow(0 4px 14px rgba(0,0,0,.5));transition:filter .6s cubic-bezier(.4,0,.2,1)}
  .hero-logo{width:min(420px,76vw);height:auto;display:block;margin:0 auto;filter:drop-shadow(0 18px 50px rgba(0,0,0,.55))}
  .logo .word{font-family:'Bodoni Moda',serif;font-weight:600;letter-spacing:.34em;font-size:21px;
    background:linear-gradient(100deg,#fff,var(--silver) 45%,var(--gold) 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;padding-left:.2em}

  /* --- barra principal (3 pilares) --- */
  .mainnav{display:flex;gap:6px}
  .mainnav button{
    font-family:'Space Mono',monospace; font-size:12px; letter-spacing:.18em; text-transform:uppercase;
    background:none;border:none;color:var(--txt-dim);cursor:pointer;padding:11px 18px;border-radius:9px;
    position:relative;transition:.25s;
  }
  .mainnav button:hover{color:#fff;background:rgba(255,255,255,.04)}
  .mainnav button.active{color:#fff}
  .mainnav button.active::after{
    content:"";position:absolute;left:18px;right:18px;bottom:4px;height:2px;border-radius:2px;
    background:linear-gradient(90deg,var(--accent),transparent);
  }
  .nav-right{display:flex;align-items:center;gap:9px}
  .sound-toggle{background:none;border:1px solid var(--line);color:var(--cream);border-radius:9px;padding:6px 10px;cursor:pointer;font-size:15px;line-height:1;transition:.2s}
  .sound-toggle:hover{background:rgba(255,255,255,.05);border-color:var(--gold)}
  .menu-toggle{display:none;background:none;border:1px solid var(--line);color:var(--cream);
    border-radius:9px;padding:8px 12px;cursor:pointer;font-size:18px}

  /* ============ SUB BAR (subbarra del pilar activo) ============ */
  .subbar-shell{position:sticky;top:84px;z-index:40;border-bottom:1px solid rgba(255,255,255,.06);
    background:linear-gradient(180deg, rgba(13,28,44,.96), rgba(13,28,44,.85));backdrop-filter:blur(10px)}
  .subbar{display:flex;align-items:center;gap:4px;height:58px;overflow-x:auto;scrollbar-width:none}
  .subbar::-webkit-scrollbar{display:none}
  .subbar .pillar-dot{display:flex;align-items:center;gap:9px;padding-right:18px;margin-right:8px;
    border-right:1px solid rgba(255,255,255,.08);white-space:nowrap}
  .subbar .pillar-dot i{width:9px;height:9px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 12px var(--accent)}
  .subbar .pillar-dot span{font-family:'Bodoni Moda',serif;font-size:15px;color:#fff;font-style:italic}
  .subbar button{
    font-size:13px;font-weight:500;letter-spacing:.02em;background:none;border:none;color:var(--txt-dim);
    cursor:pointer;padding:8px 15px;border-radius:30px;white-space:nowrap;transition:.2s;
  }
  .subbar button:hover{color:#fff}
  .subbar button.active{color:var(--ink);background:var(--accent);font-weight:600}

  /* ============ PAGE BODY ============ */
  @keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .page{animation:fade .5s ease both;padding:54px 0 90px}

  .crumbs{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--txt-dim);
    text-transform:uppercase;margin-bottom:20px}
  .crumbs b{color:var(--accent)}

  .pagehead{display:flex;align-items:flex-start;gap:22px;margin-bottom:8px}
  .pagehead .glyph{flex:none;width:60px;height:60px;border-radius:15px;display:flex;align-items:center;
    justify-content:center;font-family:'Bodoni Moda',serif;font-size:30px;font-weight:800;color:var(--ink);
    background:linear-gradient(140deg,var(--accent),var(--accent-2));box-shadow:0 14px 30px -12px var(--accent)}
  .pagehead h1{font-family:'Bodoni Moda',serif;font-weight:600;font-size:clamp(30px,5vw,50px);color:#fff;line-height:1.02}
  .pagehead .kick{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;color:var(--accent);
    text-transform:uppercase;margin-bottom:6px}
  .intro{max-width:680px;color:var(--txt);font-weight:300;font-size:16.5px;margin:18px 0 40px}

  /* content cards — same pattern every page (patrón de similitudes) */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px}
  .card{position:relative;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:26px;
    background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.008));overflow:hidden;
    transition:.3s}
  .card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 22px 44px -26px var(--accent)}
  .card::before{content:"";position:absolute;top:0;left:0;width:100%;height:2px;background:var(--accent)}
  .card .num{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.2em}
  .card h3{font-family:'Bodoni Moda',serif;font-size:21px;color:#fff;margin:6px 0 12px}
  .card .tag{display:inline-flex;align-items:center;gap:7px;font-family:'Space Mono',monospace;font-size:9.5px;
    letter-spacing:.14em;text-transform:uppercase;padding:4px 9px;border-radius:6px;margin-bottom:10px}
  .card .tag.mente{background:rgba(231,205,114,.16);color:var(--gold-lt);border:1px solid rgba(231,205,114,.35)}
  .card .tag.metodo{background:rgba(205,214,223,.13);color:var(--silver);border:1px solid rgba(205,214,223,.28)}
  .card p{font-size:14px;color:var(--txt);font-weight:300;margin-bottom:14px}
  .card .line{display:flex;gap:10px;font-size:13.5px;line-height:1.45;color:#dde5ec;font-weight:300;margin-top:9px}

  /* note panel */
  .note{margin-top:42px;border:1px dashed var(--line);border-radius:14px;padding:20px 24px;
    background:rgba(31,138,99,.07);font-size:13.5px;color:var(--txt-dim);font-weight:300}
  .note b{color:var(--cream)}

  /* home / map screen */
  .hero-home{text-align:center;padding:70px 0 30px}
  .hero-home .tag{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.4em;color:var(--gold-lt);
    text-transform:uppercase}
  .hero-home h1{font-family:'Bodoni Moda',serif;font-weight:800;font-size:clamp(40px,8vw,84px);letter-spacing:.05em;
    margin:14px 0;background:linear-gradient(120deg,#fff,var(--silver) 35%,var(--gold) 75%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .hero-home p{color:var(--txt-dim);max-width:560px;margin:0 auto;font-weight:300}
  .pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:48px}
  @media(max-width:760px){.pillars{grid-template-columns:1fr}}
  .pcard{border:1px solid var(--line);border-radius:18px;padding:34px 28px;cursor:pointer;text-align:left;
    background:linear-gradient(180deg,rgba(255,255,255,.04),transparent);transition:.3s;position:relative;overflow:hidden}
  .pcard:hover{transform:translateY(-6px);border-color:var(--pc)}
  .pcard .n{font-family:'Space Mono',monospace;font-size:12px;color:var(--pc);letter-spacing:.2em}
  .pcard h2{font-family:'Bodoni Moda',serif;font-size:26px;color:#fff;margin:10px 0 8px}
  .pcard p{font-size:13.5px;color:var(--txt-dim);font-weight:300}
  .pcard .arr{margin-top:18px;color:var(--pc);font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.1em}
  .pcard .subs{margin-top:14px;display:flex;flex-wrap:wrap;gap:6px}
  .pcard .subs span{font-size:10.5px;color:var(--txt-dim);border:1px solid rgba(255,255,255,.1);
    border-radius:30px;padding:3px 10px;font-family:'Space Mono',monospace}

  footer{border-top:1px solid var(--line);padding:30px 0;text-align:center}
  footer span{font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.22em;color:var(--txt-dim);text-transform:uppercase}

  @media(max-width:720px){
    .mainnav{display:none}
    .menu-toggle{display:block}
    .mainnav.open{display:flex;position:absolute;top:84px;right:26px;flex-direction:column;
      background:var(--ink-2);border:1px solid var(--line);border-radius:12px;padding:8px;z-index:60}
  }
</style>
</head>

<script>
/* ===== MONEXIUM sound engine (Web Audio, sin archivos) ===== */
let _ac=null, soundOn=true;
function _AC(){ if(!_ac){ try{_ac=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return null;} } if(_ac && _ac.state==='suspended') _ac.resume(); return _ac; }
function _bass(f0,f1,dur,gain,type){
  const ac=_AC(); if(!ac)return; const t=ac.currentTime;
  const o=ac.createOscillator(),g=ac.createGain(),lp=ac.createBiquadFilter();
  o.type=type||'sine';
  o.frequency.setValueAtTime(f0,t);
  o.frequency.exponentialRampToValueAtTime(Math.max(20,f1),t+dur*0.85);
  lp.type='lowpass'; lp.frequency.value=1100;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(gain,t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(lp).connect(g).connect(ac.destination);
  o.start(t); o.stop(t+dur+0.05);
}
function _coin(freq,delay,gain){
  const ac=_AC(); if(!ac)return; const t=ac.currentTime+(delay||0);
  [1,1.5,2.01].forEach((m,i)=>{
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='triangle'; o.frequency.value=freq*m;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime((gain||0.10)*(1-i*0.28),t+0.006);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
    o.connect(g).connect(ac.destination);
    o.start(t); o.stop(t+0.18);
  });
}

Object.values(_clips).forEach(a=>{ a.preload='auto'; a.volume=0.9; });
let _now=null, _capT=null;
function _fadeStop(a){ let v=a.volume; const id=setInterval(()=>{ v-=0.14; if(v<=0){ clearInterval(id); try{a.pause();a.currentTime=0;}catch(e){} a.volume=0.9; if(_now===a)_now=null; } else { a.volume=Math.max(0,v); } },40); }
function _stopAll(){ clearTimeout(_capT); if(_now){ try{_now.pause(); _now.currentTime=0; _now.volume=0.9;}catch(e){} _now=null; } }
function playPillar(k){
  if(!soundOn) return;
  const clip=_clips[k]; if(!clip) return;
  _stopAll();
  try{ clip.volume=0.9; clip.currentTime=0; const p=clip.play(); if(p&&p.catch)p.catch(()=>{}); _now=clip;
    _capT=setTimeout(()=>{ if(_now===clip) _fadeStop(clip); }, 6000); /* corte suave para clips largos */
  }catch(e){}
}
function subClick(){
  if(!soundOn) return;
  try{
    const tone = activePillar==='gestiona'?150 : activePillar==='crecer'?120 : 105;
    _bass(tone, tone*0.7, 0.16, 0.30, 'sine');
    _coin(1800,0.015,0.05);
  }catch(e){}
}
function toggleSound(){
  soundOn=!soundOn;
  const b=document.getElementById('soundBtn');
  if(b) b.textContent = soundOn?'\u{1F50A}':'\u{1F507}';
  if(!soundOn){ _stopAll(); } else { _coin(1400,0,0.07); }
}

/* ---------- STATE (en memoria, sin almacenamiento) ---------- */
/* ---- color escondido del logo: cambia segun el pilar presionado ---- */
const _LOGO_DEFAULT = 'drop-shadow(0 4px 14px rgba(0,0,0,.5))';
const LOGO_FX = {
  conecta: 'saturate(1.5) brightness(1.07) drop-shadow(0 0 12px rgba(231,205,114,.95))',
  gestiona:'grayscale(.55) brightness(1.2) drop-shadow(0 0 12px rgba(205,214,223,.95))',
  crecer:  'hue-rotate(96deg) saturate(1.6) brightness(1.05) drop-shadow(0 0 13px rgba(63,180,135,.95))'
};
function setLogoColor(k){
  const el=document.querySelector('.logo-mark'); if(!el) return;
  el.style.filter = LOGO_FX[k] || _LOGO_DEFAULT;
}
function resetLogoColor(){ const el=document.querySelector('.logo-mark'); if(el) el.style.filter=_LOGO_DEFAULT; }

let activePillar = null;
let activeSub = null;

const $ = (id)=>document.getElementById(id);

/* render barra principal */
function renderMainNav(){
  const nav = $("mainnav"); nav.innerHTML="";
  Object.keys(DATA).forEach(k=>{
    const b=document.createElement("button");
    b.textContent=DATA[k].label;
    b.className = (k===activePillar?"active":"");
    b.style.setProperty("--accent", DATA[k].accent);
    b.onclick=()=>selectPillar(k);
    nav.appendChild(b);
  });
}

function selectPillar(k){
  playPillar(k);
  setLogoColor(k);
  activePillar=k; activeSub=DATA[k].subs[0].id;
  document.documentElement.style.setProperty("--accent", DATA[k].accent);
  document.documentElement.style.setProperty("--accent-2", DATA[k].accent2);
  $("mainnav").classList.remove("open");
  renderMainNav(); renderSubbar(); renderPage();
  window.scrollTo({top:0,behavior:"smooth"});
}

/* render subbarra */
function renderSubbar(){
  const p=DATA[activePillar]; const sb=$("subbar"); sb.innerHTML="";
  $("subShell").style.display="block";
  const dot=document.createElement("div"); dot.className="pillar-dot";
  dot.innerHTML=`<i></i><span>${p.label}</span>`; sb.appendChild(dot);
  p.subs.forEach(s=>{
    const b=document.createElement("button");
    b.textContent=s.label; b.className=(s.id===activeSub?"active":"");
    b.onclick=()=>{subClick(); activeSub=s.id; renderSubbar(); renderPage();};
    sb.appendChild(b);
  });
}

/* render página de la sub-sección (mismo patrón siempre) */
function renderPage(){
  const p=DATA[activePillar]; const s=p.subs.find(x=>x.id===activeSub);
  const cards=s.cards.map(c=>`
    <div class="card">
      <div class="num">${c.n}</div>
      <span class="tag ${c.tag}">${c.tag==="mente"?"◆ Mente":"▣ Método"}</span>
      <h3>${c.title}</h3>
      <p>${c.p}</p>
      <div class="line"><span style="color:var(--gold-lt)">→</span>${c.mente}</div>
      <div class="line"><span style="color:var(--silver)">→</span>${c.metodo}</div>
    </div>`).join("");
  $("content").innerHTML=`
    <div class="page">
      <div class="crumbs">MONEXIUM / <b>${p.label}</b> / ${s.label}</div>
      <div class="pagehead">
        <div class="glyph">${p.glyph}</div>
        <div>
          <div class="kick">${p.kick} · ${s.label}</div>
          <h1>${s.title}</h1>
        </div>
      </div>
      <p class="intro">${s.intro}</p>
      <div class="cards">${cards}</div>
      <div class="note">Cada sección usa el <b>mismo patrón</b>: encabezado + tarjetas con etiqueta <b>Mente</b> (el cambio de creencia) y <b>Método</b> (la acción concreta). Así el usuario aprende a leer una página y entiende todas.</div>
    </div>`;
}
