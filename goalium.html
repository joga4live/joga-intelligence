const FX_SWELL = ""; // swell largo (20s)
const FX_RISE = ""; // cinemático (15s)

const _audioCache = {};
function fx(src, vol = 0.85, rate = 1) {
  try {
    let base = _audioCache[src];
    if (!base) {
      base = new Audio(src);
      base.preload = "auto";
      _audioCache[src] = base;
    }
    const a = base.cloneNode(); // clon = permite booms solapados sin cortarse
    a.volume = Math.max(0, Math.min(1, vol));
    a.playbackRate = rate;
    a.play().catch(() => {});
  } catch (e) {}
}

function fxAll() {
  fx(FX_CLICK, 0.9);
  fx(FX_RISE, 0.5);
  setTimeout(() => fx(FX_POP, 0.9), 150);
  setTimeout(() => fx(FX_SWELL, 0.42), 320);
}

.cap-sub{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;}

.jtabs{display:flex;gap:8px;margin-bottom:16px;}
.jtab{flex:1;padding:11px;border-radius:12px;background:var(--card);border:1px solid var(--line);color:var(--dim);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;cursor:pointer;}
.jtab.on{background:var(--grad);color:#0b0b0b;border-color:transparent;}
.cal-list{display:grid;gap:10px;}
.cal-row{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;}
.cal-meta{display:flex;gap:8px;align-items:center;margin-bottom:9px;}
.cal-date{font-family:'Space Mono',monospace;font-size:12px;color:var(--gold-lt);letter-spacing:.1em;}
.cal-grp{font-family:'Space Mono',monospace;font-size:9px;color:var(--dim);background:rgba(255,255,255,.05);padding:2px 7px;border-radius:99px;}
.cal-match{display:flex;align-items:center;gap:10px;}
.cside{display:flex;align-items:center;gap:8px;flex:1;}.cside.r{justify-content:flex-end;}
.cn{font-size:13.5px;font-weight:500;}
.cscore{display:flex;align-items:center;gap:6px;}
.cal-stad{font-family:'Space Mono',monospace;font-size:10px;color:var(--dim);margin-top:10px;letter-spacing:.05em;}

.hint{font-size:13px;color:var(--cream);background:rgba(201,162,39,.08);border:1px solid var(--line);padding:11px 14px;border-radius:12px;margin-bottom:16px;}
.bnote{font-size:12px;color:var(--dim);text-align:center;margin-top:14px;font-family:'Space Mono',monospace;letter-spacing:.05em;}
.champ-wrap{margin-bottom:22px;}
.champ{position:relative;overflow:hidden;text-align:center;padding:28px;border-radius:18px;
  background:linear-gradient(135deg,rgba(201,162,39,.18),rgba(201,162,39,.05));border:1px solid var(--gold);}
.champ.idle{background:var(--card);border:1px dashed var(--line);color:var(--dim);display:flex;align-items:center;gap:14px;justify-content:center;flex-wrap:wrap;}
.champ-cap{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.3em;color:var(--gold-lt);}
.champ-team{display:flex;align-items:center;gap:14px;justify-content:center;margin-top:8px;}
.champ-team h2{font-family:'Bodoni Moda',serif;font-weight:800;font-size:clamp(28px,7vw,46px);}
.ct{font-size:30px;display:block;margin-top:6px;}.ct.dim{font-size:40px;opacity:.4;margin:0;}
.confetti{position:absolute;inset:0;pointer-events:none;}
.confetti i{position:absolute;top:-10px;width:7px;height:13px;border-radius:2px;animation:fall 2.6s linear infinite;}
@keyframes fall{to{transform:translateY(320px) rotate(540deg);opacity:0;}}
.bracket-scroll{overflow-x:auto;padding-bottom:8px;}
.bracket-scroll::-webkit-scrollbar{height:8px;}.bracket-scroll::-webkit-scrollbar-thumb{background:rgba(201,162,39,.25);border-radius:99px;}
.bracket{display:flex;gap:14px;min-width:max-content;align-items:stretch;}
.bcol{display:flex;flex-direction:column;min-width:185px;}
.bcol-h{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--dim);text-align:center;margin-bottom:10px;text-transform:uppercase;}
.bcol-body{flex:1;display:flex;flex-direction:column;gap:8px;}
.mbox{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;}.mbox.dim{opacity:.4;}
.bt{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;background:none;border:none;border-bottom:1px solid var(--line);color:var(--tx);cursor:pointer;font-size:12.5px;text-align:left;transition:.15s;}
.bt:last-child{border-bottom:none;}.bt:hover:not(.empty){background:rgba(201,162,39,.07);}
.bt.sel{background:linear-gradient(90deg,rgba(201,162,39,.25),transparent);font-weight:600;}
.bt.empty{color:var(--dim);cursor:default;font-style:italic;}
.btn-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.seed{font-family:'Space Mono',monospace;font-size:9px;color:var(--dim);background:rgba(255,255,255,.07);padding:2px 5px;border-radius:5px;}
.bt.sel .seed{background:var(--gold-lt);color:#1a1208;}
.g-foot{position:relative;z-index:2;text-align:center;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;color:var(--dim);padding:24px 16px 40px;}

/* EASTER EGG — trofeo flotante con 2 botones ocultos */
.egg{position:fixed;right:18px;bottom:calc(18px + env(safe-area-inset-bottom));z-index:50;width:62px;height:62px;}
.egg-main{position:absolute;inset:0;width:62px;height:62px;border-radius:50%;border:none;cursor:pointer;font-size:30px;line-height:1;
  background:var(--grad);box-shadow:0 8px 30px rgba(201,162,39,.5);animation:eggpulse 2.8s ease-in-out infinite;transition:transform .3s;}
.egg-main:hover{transform:scale(1.08) rotate(-6deg);}
.egg.open .egg-main{transform:rotate(14deg) scale(1.05);}
@keyframes eggpulse{0%,100%{box-shadow:0 8px 30px rgba(201,162,39,.45);transform:translateY(0)}50%{box-shadow:0 12px 44px rgba(231,205,114,.8);transform:translateY(-3px)}}
.egg-sub{position:absolute;right:9px;bottom:9px;width:44px;height:44px;border-radius:50%;border:1px solid var(--gold);
  background:var(--card2);color:var(--gold-lt);font-size:17px;cursor:pointer;opacity:0;transform:scale(.3);pointer-events:none;
  transition:transform .45s cubic-bezier(.2,1.5,.4,1),opacity .3s;box-shadow:0 6px 20px rgba(0,0,0,.55);display:grid;place-items:center;}
.egg.open .egg-sub{opacity:1;pointer-events:auto;}
.egg.open .egg-sub.music{transform:translateY(-74px) scale(1);}
.egg.open .egg-sub.colors{transform:translate(-66px,-36px) scale(1);}
.egg-sub.music{padding-left:2px;}
.egg-hint{position:absolute;right:72px;bottom:20px;white-space:nowrap;font-family:'Space Mono',monospace;font-size:10px;
  letter-spacing:.12em;color:var(--gold-lt);background:rgba(7,7,7,.7);padding:5px 10px;border-radius:20px;border:1px solid var(--line);
  animation:hintfloat 2.4s ease-in-out infinite;pointer-events:none;}
@keyframes hintfloat{0%,100%{opacity:.55;transform:translateX(0)}50%{opacity:1;transform:translateX(-4px)}}
.fx-flash{position:fixed;inset:0;z-index:48;pointer-events:none;animation:fxflash .65s ease-out;}
.fx-flash.conecta{background:radial-gradient(circle at 82% 88%,rgba(231,205,114,.6),transparent 58%);}
.fx-flash.gestiona{background:radial-gradient(circle at 82% 88%,rgba(205,214,223,.55),transparent 58%);}
.fx-flash.crecer{background:radial-gradient(circle at 82% 88%,rgba(63,180,135,.6),transparent 58%);}
@keyframes fxflash{0%{opacity:0}22%{opacity:1}100%{opacity:0}}
.theme-toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:60;background:var(--card2);
  border:1px solid var(--gold);color:var(--gold-lt);font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.14em;
  padding:9px 18px;border-radius:30px;box-shadow:0 8px 30px rgba(0,0,0,.5);animation:fade .3s;}
`;
